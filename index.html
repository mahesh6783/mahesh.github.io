<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #login{
             margin-top:15px;
             background-color: black;
             padding:14px;
             color:white;
             border-radius:5px;
             width:300px;
        }
        .textbox{
            margin-top: 12px;
            width:273px;
            background-color: black;
            color:white;
            border:none;
            padding:14px;
            border-radius: 6px;
        }
        h3{
            text-shadow: 0 0 10px #2196f3, 0 0 40px #2196f3, 0 0 80px #2196f3;
            color:#2196f3;
            border:solid;
            border-radius:5px;
            width:273px;
            padding:14px;
            
        }
        #div1{
            border:solid;
            width:400px;
            padding:12px;
            color:#2196f3;
             
            
        }
        #login:hover{
            box-shadow: 0 0 10px #2196f3, 0 0 40px #2196f3, 0 0 80px #2196f3;
             
        }
        body{
            background-color: rgb(53, 46, 46);
        }
    </style>
</head>
<body>
    

    
    <center>
        <div id="div1">
        <h3>LOGIN</h3>
        <div>
         <input class="textbox" type="text" placeholder="ENTER NAME" required>
         <BR>
        <input class="textbox" type="password" placeholder="ENTER PASSWORD" required>
         <br>   
         <input id="login" type="submit" value="LOG IN">

          
        </div>
        </div>
        
        </center>
   
</body>
</html>
